aid: wpx-energy
name: WPX Energy
description: >-
  WPX Energy was an independent oil and gas exploration and production company
  focused on the Permian and Williston basins. In 2021, WPX Energy completed a
  merger with Devon Energy Corporation to form one of the largest independent
  oil and gas producers in the United States. As a result of the merger, WPX
  Energy no longer operates as a standalone company and does not maintain a
  public developer API. WPX Energy data is available through financial data
  providers such as Intrinio and through Devon Energy's current platforms.
